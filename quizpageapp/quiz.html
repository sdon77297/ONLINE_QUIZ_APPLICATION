<!DOCTYPE html>
<html>
<head>

    <title>Available Quizzes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Available Quizzes
    </h2>

    <div class="row">

        {% for quiz in quizzes %}

        <div class="col-md-4">

            <div class="card mb-4 shadow">

                <div class="card-body">

                    <h4>{{ quiz.title }}</h4>

                    <p>
                        {{ quiz.description }}
                    </p>

                    <p>
                        Duration:
                        {{ quiz.duration }}
                        Minutes
                    </p>

                    <p>
                        Total Marks:
                        {{ quiz.total_marks }}
                    </p>

                    <a href="{% url 'start_quiz' quiz.id %}"
                       class="btn btn-primary">

                        Start Quiz

                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
