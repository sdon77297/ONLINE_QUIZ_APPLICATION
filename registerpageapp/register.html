<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(
            to right,
            #0d6efd,
            #4e73df);
        }

        .register-card{

            max-width:550px;

            margin:50px auto;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="register-card">

    <h2>Student Registration</h2>

    {% if messages %}
        {% for message in messages %}

            <div class="alert alert-info">
                {{ message }}
            </div>

        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Phone
            </label>

            <input type="text"
                   name="phone"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                College
            </label>

            <input type="text"
                   name="college"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                City
            </label>

            <input type="text"
                   name="city"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Confirm Password
            </label>

            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary w-100">

            Register

        </button>

    </form>

    <div class="text-center mt-3">

        Already have an account?

        <a href="{% url 'login' %}">
            Login
        </a>

    </div>

</div>

</body>
</html>
