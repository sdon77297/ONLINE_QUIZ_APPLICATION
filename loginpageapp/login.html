<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#0d6efd,#4e73df);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>
<body>

<div class="login-card">

    <h2 class="title">Student Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <div class="text-center mt-3">

        Don't have an account?

        <a href="{% url 'register' %}">
            Register
        </a>

    </div>

</div>

</body>
</html>
